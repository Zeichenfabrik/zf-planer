<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Zeichenfabrik – All-in-One</title>
<!--
  ============================================================================
  ZEICHENFABRIK – ALL-IN-ONE
  ============================================================================
  Drei Tools in einer Datei:
  1. Wien – Standortrechner
  2. Graz – Standortrechner  
  3. Wien – Programmplanung
  
  Läuft offline. Im Browser öffnen (Doppelklick). Keine Abhängigkeiten.
  
  HINWEIS: Diese Datei lädt die drei Apps als IFrames.
  Damit das funktioniert, müssen die HTML-Dateien im gleichen Ordner liegen:
  - Zeichenfabrik_Wien_Standortrechner.html
  - Zeichenfabrik_Graz_Standortrechner.html
  - Zeichenfabrik_Wien_Programmplanung.html
  ============================================================================
-->
<style>
  :root{
    --paper:#FAFAF8; --ink:#1B1B1A; --muted:#6E6B66; --faint:#9A968F;
    --line:#E6E3DD; --card:#F1EFEA; --card2:#FBFAF7; --field:#FFFFFF;
    --accent:#36605E; --pos:#2E6B4F; --neg:#A8443A; --warn:#9A6A1B;
    --serif:Georgia,"Times New Roman",serif;
    --sans:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --r:10px;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --paper:#15171A; --ink:#ECEAE5; --muted:#9C988F; --faint:#6E6B66;
      --line:#2A2D31; --card:#1E2125; --card2:#202327; --field:#26292D;
      --accent:#63ABA3; --pos:#5FB389; --neg:#DA8B81; --warn:#D9AE6A;
    }
  }
  *{box-sizing:border-box;}
  html,body{margin:0; height:100%;}
  body{background:var(--paper); color:var(--ink); font-family:var(--sans); font-size:15px; line-height:1.5;}
  
  /* Tab Navigation */
  .tab-header{background:var(--card); border-bottom:1px solid var(--line); padding:0 20px; position:sticky; top:0; z-index:100;}
  .tab-nav{display:flex; gap:4px; max-width:1200px; margin:0 auto;}
  .tab-button{padding:12px 20px; background:none; border:none; border-bottom:3px solid transparent; cursor:pointer; font-family:var(--sans); font-size:14px; color:var(--muted); transition:border-color 0.2s;}
  .tab-button:hover{color:var(--ink);}
  .tab-button.active{color:var(--accent); border-bottom-color:var(--accent); font-weight:600;}
  
  /* Tab Content */
  .tab-content{display:none; height:calc(100vh - 50px);}
  .tab-content.active{display:block;}
  
  /* Iframe Styling */
  .iframe-container{width:100%; height:100%; border:none;}
  .iframe-container iframe{width:100%; height:100%; border:none;}
  
  /* Info Banner */
  .info-banner{background:var(--card2); border-bottom:1px solid var(--line); padding:10px 20px; text-align:center; font-size:13px; color:var(--muted);}
  .info-banner a{color:var(--accent); text-decoration:none;}
  .info-banner a:hover{text-decoration:underline;}
</style>
</head>
<body>

<!-- Tab Navigation -->
<div class="tab-header">
  <div class="tab-nav">
    <button class="tab-button active" data-tab="wien-rechner">Wien – Standortrechner</button>
    <button class="tab-button" data-tab="graz-rechner">Graz – Standortrechner</button>
    <button class="tab-button" data-tab="wien-programm">Wien – Programmplanung</button>
  </div>
</div>

<!-- Info Banner -->
<div class="info-banner">
  Hinweis: Die Apps werden als IFrames geladen. Stelle sicher, dass die Dateien 
  <code>Zeichenfabrik_Wien_Standortrechner.html</code>, 
  <code>Zeichenfabrik_Graz_Standortrechner.html</code> und 
  <code>Zeichenfabrik_Wien_Programmplanung.html</code> im gleichen Ordner liegen.
</div>

<!-- Tab Contents -->
<div id="wien-rechner" class="tab-content active">
  <div class="iframe-container">
    <iframe src="Zeichenfabrik_Wien_Standortrechner.html"></iframe>
  </div>
</div>

<div id="graz-rechner" class="tab-content">
  <div class="iframe-container">
    <iframe src="Zeichenfabrik_Graz_Standortrechner.html"></iframe>
  </div>
</div>

<div id="wien-programm" class="tab-content">
  <div class="iframe-container">
    <iframe src="Zeichenfabrik_Wien_Programmplanung.html"></iframe>
  </div>
</div>

<script>
// Tab Navigation
document.addEventListener('DOMContentLoaded', function() {
  var tabButtons = document.querySelectorAll('.tab-button');
  var tabContents = document.querySelectorAll('.tab-content');
  
  tabButtons.forEach(function(button) {
    button.addEventListener('click', function() {
      var tabId = this.getAttribute('data-tab');
      
      // Deactivate all buttons and contents
      tabButtons.forEach(function(btn) { btn.classList.remove('active'); });
      tabContents.forEach(function(content) { content.classList.remove('active'); });
      
      // Activate selected
      this.classList.add('active');
      document.getElementById(tabId).classList.add('active');
    });
  });
});
</script>

</body>
</html>
